name: Cron · drip emails (hourly)

# Hits /api/cron/drip every hour. The route is idempotent (unique index
# on EmailDispatch (userId, kind, day) prevents double-send) so missed
# minutes are recoverable on the next tick.
#
# Required GitHub secrets:
#   APP_URL       https://your-domain.com   (no trailing slash)
#   CRON_SECRET   matches the env var deployed to Railway
#
# Free GitHub Actions tier covers this comfortably (~10s per run × 24 = ~4 min/day).

on:
  schedule:
    - cron: "0 * * * *"     # every hour on the hour, UTC
  workflow_dispatch: {}     # allow manual run from the Actions UI

permissions:
  contents: read

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::APP_URL or CRON_SECRET not set; skipping."
            exit 0
          fi
          RESPONSE=$(curl -fsS --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/drip")
          echo "Response: $RESPONSE"
