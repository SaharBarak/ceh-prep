# Persistent local Mongo for developers who don't want the in-process
# mongodb-memory-server path. Start with: docker compose up -d
# Stop with:                              docker compose down
# Wipe data with:                         docker compose down -v
#
# Then in .env.local:
#   MONGO_URI=mongodb://localhost:27017/ceh-prep
services:
  mongo:
    image: mongo:7
    container_name: ceh-prep-mongo
    ports:
      - "27017:27017"
    volumes:
      - ceh-prep-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  ceh-prep-mongo-data:
