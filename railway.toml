# ───────────────────────────────────────────────────────────────
# Railway service config — Next.js app
# ───────────────────────────────────────────────────────────────
# Two-service deploy: this file declares the web service. The cron
# service is configured separately in the Railway dashboard via the
# "Cron" deploy trigger pattern (see deploy/RAILWAY.md).
#
# Build context is the repo root (Dockerfile at repo root reads both
# app/ and docs/). Railway autodetects this when Dockerfile sits at
# the root of the linked repo.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use the standalone Node entrypoint baked into the image (CMD).
# Health check verifies DB connectivity before flipping the new
# revision live; previous revision keeps serving on failure.
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Build-time public env vars that get inlined into the client bundle.
# Set the matching variables in Railway's dashboard; the build args
# pick them up via the [build.args] block below.
[build.args]
NEXT_PUBLIC_APP_URL = "${{NEXT_PUBLIC_APP_URL}}"
NEXT_PUBLIC_PADDLE_ENV = "${{NEXT_PUBLIC_PADDLE_ENV}}"
NEXT_PUBLIC_PADDLE_CLIENT_TOKEN = "${{NEXT_PUBLIC_PADDLE_CLIENT_TOKEN}}"
NEXT_PUBLIC_GA4_MEASUREMENT_ID = "${{NEXT_PUBLIC_GA4_MEASUREMENT_ID}}"
